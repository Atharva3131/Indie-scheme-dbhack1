        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>

                occupation: '',
                state: 'Karnataka'
            });

            const handleChange = (field, value) => {
                setFormData({ ...formData, [field]: value });
            };
            
            const handleSubmit = () => {
                onSubmit(formData);
            };
            
            if (isSubmitted) return null;

                            className="flex-1 px-5 py-3 border-2 border-gray-200 rounded-xl focus:border-green-500 focus:outline-none focus:ring-4 focus:ring-green-100 transition-all"

                    <div className="space-y-6">
                        <div>
                            <h4 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-3">{scheme.name}</h4>
                            <p className="text-gray-700 leading-relaxed text-lg">{scheme.description}</p>
                        </div>
                        
                        <div className="bg-gradient-to-r from-green-50 to-emerald-50 p-5 rounded-2xl border-2 border-green-200">
                            <div className="flex items-center gap-2 mb-3">
                                <svg className="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                </svg>
                                <span className="font-bold text-green-800 text-lg">{t.eligible}</span>
                            </div>
                            <p className="text-gray-700 font-medium">{scheme.eligibility}</p>
                        </div>
                        
                        <div className="bg-gradient-to-r from-amber-50 to-orange-50 p-5 rounded-2xl border-2 border-amber-200">
                            <div className="flex items-center gap-2 mb-3">
                                <span className="text-2xl">💰</span>
                                <span className="font-bold text-amber-800 text-lg">{t.benefits}</span>
                            </div>
                            <p className="text-gray-700 font-medium text-lg">{scheme.benefits}</p>
                        </div>
                        
                        <div>
                            <div className="flex items-center gap-2 mb-4">
                                <span className="bg-blue-500 text-white p-2 rounded-lg">
                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clipRule="evenodd" />
                                    </svg>
                                </span>
                                <span className="font-bold text-gray-700 text-lg">{t.documents}</span>
                            </div>
                            <ul className="space-y-3">
                                {scheme.documents.map((doc, idx) => (
                                    <li key={idx} className="flex items-center gap-3 text-gray-700 bg-white p-3 rounded-xl border border-gray-200">
                                        <span className="w-3 h-3 bg-gradient-to-r from-blue-400 to-purple-500 rounded-full flex-shrink-0"></span>
                                        <span className="font-medium">{doc}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Main App Component
        const App = () => {
            const [language, setLanguage] = useState('english');
            const [isEligibilitySubmitted, setIsEligibilitySubmitted] = useState(false);
            const [schemeNames, setSchemeNames] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [selectedScheme, setSelectedScheme] = useState(null);
            const [loading, setLoading] = useState(false);
            
            const handleEligibilitySubmit = async (formData) => {
                setLoading(true);
                try {
                    const response = await fetch('/api/eligibility', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_profile: {
                                age: parseInt(formData.age),
                                income: parseInt(formData.income),
                                category: formData.category,
                                occupation: formData.occupation,
                                state: formData.state
                            },
                            language: language
                        })
                    });
                    const data = await response.json();
                    
                    const allSchemes = [...(data.eligible_schemes || []), ...(data.recommended_schemes || [])].map(s => s.scheme);
                    const names = allSchemes.map(s => s.name);
                    
                    window.fetchedSchemes = allSchemes;
                    setSchemeNames(names);
                    setIsEligibilitySubmitted(true);
                } catch (error) {
                    console.error('Error fetching eligibility:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleSendMessage = async (message) => {
                // Add user message
                const newMessages = [...chatMessages, { type: 'user', text: message }];
                setChatMessages(newMessages);
                
                setLoading(true);
                try {
                    // Search for relevant schemes based on the message
                    const searchResp = await fetch('/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: message,
                            language: language,
                            top_k: 1
                        })
                    });
                    const searchData = await searchResp.json();
                    
                    if (searchData.results && searchData.results.length > 0) {
                        const topSchemeResult = searchData.results[0].scheme;
                        
                        const documentList = topSchemeResult.required_documents || [];
                        const benefitsStr = Array.isArray(topSchemeResult.benefits) ? topSchemeResult.benefits.join(', ') : (topSchemeResult.benefits || '');
                        
                        const mappedScheme = {
                            name: topSchemeResult.name,
                            description: topSchemeResult.description,
                            eligibility: topSchemeResult.eligibility_criteria || '',
                            benefits: benefitsStr,
                            documents: typeof documentList === 'string' ? [documentList] : documentList
                        };
                        setSelectedScheme(mappedScheme);
                        
                        // Format a conversational response using Sarvam AI
                        const formatResp = await fetch('/api/format', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                schemes: [{
                                    scheme: topSchemeResult,
                                    match_score: searchData.results[0].match_score || 100.0,
                                    eligibility_reason: "Matched via search",
                                    is_eligible: true
                                }],
                                language: language
                            })
                        });
                        const formatData = await formatResp.json();
                        
                        setChatMessages(prev => [...prev, { type: 'bot', text: formatData.formatted_response }]);
                    } else {
                        const fallbackMsg = language === 'english'
                            ? "I couldn't find a scheme matching your request."
                            : "मुझे आपके अनुरोध से मेल खाने वाली कोई योजना नहीं मिली।";
                        setChatMessages(prev => [...prev, { type: 'bot', text: fallbackMsg }]);
                    }
                } catch (error) {
                    console.error('Error in chat:', error);
                    setChatMessages(prev => [...prev, { type: 'bot', text: "Sorry, an error occurred." }]);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div className="min-h-screen" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                    <Navbar language={language} onLanguageToggle={() => setLanguage(language === 'english' ? 'hindi' : 'english')} />
                    
                    <div className="max-w-7xl mx-auto px-6 py-10">
                        {!isEligibilitySubmitted ? (
                            <EligibilityForm 
                                onSubmit={handleEligibilitySubmit} 
                                language={language} 
                                isSubmitted={isEligibilitySubmitted}
                            />
                        ) : (
                            <div className="space-y-6">
                                <SchemeNamesList schemes={schemeNames} language={language} />
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <ChatInterface 
                                        onSendMessage={handleSendMessage} 
                                        messages={chatMessages}
                                        language={language}
                                        isVisible={isEligibilitySubmitted}
                                    />
                                    <SchemeDetails 
                                        scheme={selectedScheme} 
                                        language={language}
                                        isVisible={isEligibilitySubmitted}
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
